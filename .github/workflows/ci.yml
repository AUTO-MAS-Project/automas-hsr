name: CI

on:
  pull_request:
  push:
    branches: [main, dev, "release/**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --all-packages --group dev
      - run: uv run python -m unittest discover -s tests -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --all-packages --group dev
      - run: uv run python scripts/build_all.py
      - run: uv run twine check dist/*/*
      - name: Resolve adapters against the locally built core wheel
        run: >-
          uv run python scripts/smoke_wheels.py dist
          --mode local-adapter-resolution
      - uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/**/*
          if-no-files-found: error
          retention-days: 7
