[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "automas-script-hsr"
version = "0.1.0"
description = "HSR orchestration and adapter contracts for AUTO-MAS"
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.12"
dependencies = ["pydantic>=2"]

[project.urls]
Homepage = "https://github.com/AUTO-MAS-Project/automas-hsr"
Repository = "https://github.com/AUTO-MAS-Project/automas-hsr"

[project.entry-points."auto_mas.plugins"]
automas_script_hsr = "automas_script_hsr.plugin:Plugin"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
automas_script_hsr = ["templates/*.html"]
