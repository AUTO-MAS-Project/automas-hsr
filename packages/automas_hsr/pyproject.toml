[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "automas-hsr"
version = "0.1.0"
description = "AUTO-MAS HSR plugin bundle for one-click core, SRA, and M7A installation"
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.12"
authors = [{ name = "AUTO-MAS Team" }]
license = "AGPL-3.0-or-later"
license-files = ["LICENSE"]
dependencies = [
    "automas-script-hsr>=0.1.0,<0.2.0",
    "automas-hsr-adapter-sra>=0.1.0,<0.2.0",
    "automas-hsr-adapter-m7a>=0.1.0,<0.2.0",
]

[project.urls]
Homepage = "https://github.com/AUTO-MAS-Project/automas-hsr"
Repository = "https://github.com/AUTO-MAS-Project/automas-hsr"
Documentation = "https://doc.auto-mas.top/"
Issues = "https://github.com/AUTO-MAS-Project/automas-hsr/issues"

[tool.setuptools]
packages = []
